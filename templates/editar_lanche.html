{% extends 'inicio.html' %}
{% block content %}

<div class="div_pai_cadastrar_pessoa">
    <form class="form"
          method="post"
          action="{{ url_for('editar_lanche', id_lanche=lanche['id_lanche']) }}">

        <p class="title">Editar</p>
        <p class="message">Editar Lanche</p>

        <label>
            <input
                    name="nome_lanche"
                    value="{{ lanche['nome_lanche'] }}"
                    class="inputt"
                    type="text"
                    required
            >
            <span>Nome</span>
        </label>

        <label for="disponivel">Disponiblidade:</label>
        <select id="disponivel" name="disponivel">

            <option value="true"
                    {% if lanche[
            'disponivel'] %}
            selected
            {% endif %}
            >
            Disponível
            </option>

            <option value="false"
                    {% if not lanche[
            'disponivel'] %}
            selected
            {% endif %}
            >
            Indisponível
            </option>

        </select>
        <label>
            <input
                    name="valor_lanche"
                    value="{{ lanche['valor_lanche'] }}"
                    class="inputt"
                    type="number"
                    step="0.01"
                    required
            >
        </label>

        <label>
            <input
                    name="descricao_lanche"
                    value="{{ lanche['descricao_lanche'] }}"
                    class="inputt"
                    type="text"
                    required
            >
            <span>Descrição</span>
        </label>

        <button class="submit">Salvar</button>
        <a href="{{ url_for('lanches') }}">Cancelar</a>

    </form>
</div>

{% endblock %}
