{% extends 'inicio.html' %}
{% block content %}

<div class="div_pai_cadastrar_pessoa">
    <form class="form"
          method="post"
          action="{{ url_for('editar_bebida', id_bebida=bebida['id_bebida']) }}">



        <p class="title">Editar</p>
        <p class="message">Editar Bebida</p>

        <label>
            <input
                    name="nome_bebida"
                    value="{{ bebida['nome_bebida'] }}"
                    class="inputt"
                    type="text"
                    required
            >
            <span>Nome</span>
        </label>

<!--        True or False Status bebida-->
        <label for="status_bebida">Disponiblidade:</label>
        <select id="status_bebida" name="status_bebida">

            <option value="true"
                    {% if bebida[
            'status_bebida'] %}
            selected
            {% endif %}
            >
            Disponível
            </option>

            <option value="false"
                    {% if not bebida[
            'status_bebida'] %}
            selected
            {% endif %}
            >
            Indisponível
            </option>

        </select>
        <label>
            <input
                    name="valor"
                    value="{{ bebida['valor'] }}"
                    class="inputt"
                    type="number"
                    step="0.01"
                    required
            >
            <span>Valor</span>
        </label>

        <label>
            <input
                    name="descricao"
                    value="{{ bebida['descricao'] }}"
                    class="inputt"
                    type="text"
                    required
            >
            <span>Descrição</span>
        </label>

        <label>
            <input
                    name="quantidade"
                    value="{{ bebida['quantidade'] }}"
                    class="inputt"
                    type="number"
                    step="0.01"
                    required
            >
            <span>Quantidade</span>
        </label>



       <label>
            <span>Categoria</span>
            <select name="categoria" required>
                <option value="">Selecione</option>
                {% for c in categorias %}
                    <option value="{{ c['id_categoria'] }}"
                        {% if c['id_categoria'] == bebida['categoria'] %}selected{% endif %}>
                        {{ c['nome_categoria'] }}
                    </option>
                {% endfor %}
            </select>
        </label>



        <button class="submit">Salvar</button>
        <a href="{{ url_for('bebidas') }}">Cancelar</a>

    </form>
</div>

{% endblock %}
